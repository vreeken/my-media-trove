version: '3.8'

services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: mmt_nginx
    # REMOVED ports - Nginx Proxy Manager will handle external access
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - frontend
    networks:
      - proxy        # Connected to Nginx Proxy Manager
      - mmt_network  # Connected to your other containers

  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_php
    volumes:
      - ./backend:/var/www/html
    environment:
      - PHP_MEMORY_LIMIT=1024M
    depends_on:
      - mysql
      - redis
    networks:
      - mmt_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mmt_redis
    # Keep port exposed if you want to access from your local machine for development
    # Remove it in production for security
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - mmt_network

  # Vue.js Frontend (Development)
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: mmt_frontend
    # REMOVED ports - accessed through nginx container
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    networks:
      - mmt_network

  # Queue Worker
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_queue
    volumes:
      - ./backend:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - mysql
      - redis
    networks:
      - mmt_network

  # Scheduler
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_scheduler
    volumes:
      - ./backend:/var/www/html
    command: /bin/sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    depends_on:
      - mysql
      - redis
    networks:
      - mmt_network

networks:
  proxy:
    external: true  # Connects to Nginx Proxy Manager
  mmt_network:
    driver: bridge  # Internal network for your containers

volumes:
  mysql_data:
  redis_data:
  frontend_node_modules: