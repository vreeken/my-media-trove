services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: mmt_nginx
    ports:
      - "3030:80"
      - "3443:443"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - frontend
    networks:
      - mmt_network

  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_php
    volumes:
      - ./backend:/var/www/html
    environment:
      - PHP_MEMORY_LIMIT=1024M
    depends_on:
      - mysql
      - redis
    networks:
      - mmt_network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mmt_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-my_media_trove}
      MYSQL_USER: ${DB_USERNAME:-mmt_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mmt_secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mmt_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - mmt_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mmt_redis
    ports:
      - "6380:6379"  # Host port 6380 -> Container port 6379
    volumes:
      - redis_data:/data
    networks:
      - mmt_network

  # Vue.js Frontend (Development)
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: mmt_frontend
    ports:
      - "5273:5173"  # Host port 5174 -> Container port 5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    networks:
      - mmt_network

  # Queue Worker
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_queue
    volumes:
      - ./backend:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - mysql
      - redis
    networks:
      - mmt_network

  # Scheduler
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_scheduler
    volumes:
      - ./backend:/var/www/html
    command: /bin/sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    depends_on:
      - mysql
      - redis
    networks:
      - mmt_network

networks:
  mmt_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  frontend_node_modules:
