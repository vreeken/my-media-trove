services:
  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: mmt_nginx
    # Removed ports - Nginx Proxy Manager handles external access
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/var/www/frontend
    depends_on:
      - php
      - frontend
    networks:
      - proxy        # Connected to Nginx Proxy Manager
      - mmt_network  # Connected to your other containers

  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_php
    volumes:
      - ./backend:/var/www/html
    environment:
      - PHP_MEMORY_LIMIT=1024M
    depends_on:
      - redis
    networks:
      - mmt_network

  # MySQL Database (dev only)
  mysql:
    image: mysql:8.0
    container_name: mmt_mysql
    profiles: ["dev"]  # Only starts with --profile dev
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-my_media_trove}
      MYSQL_USER: ${DB_USERNAME:-mmt_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mmt_secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-mmt_secret}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - mmt_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mmt_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - mmt_network

  # Vue.js Frontend
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: mmt_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=production
    command: ["sh", "-c", "npm install --include=dev && npm run build"]
    networks:
      - mmt_network

  # Queue Worker
  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_queue
    volumes:
      - ./backend:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - redis
    networks:
      - mmt_network

  # Scheduler
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: mmt_scheduler
    volumes:
      - ./backend:/var/www/html
    command: /bin/sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    depends_on:
      - redis
    networks:
      - mmt_network

networks:
  proxy:
    external: true  # Connects to Nginx Proxy Manager
    name: docker_proxy
  mmt_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  frontend_node_modules: