server {
    listen 80;
    server_name localhost;
    
    # Global root for Laravel (used by API, auth, and PHP blocks)
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # API routes - proxy to PHP-FPM
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF cookie
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Auth routes
    location /auth {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP handling
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Static assets from Laravel
    location /storage {
        alias /var/www/html/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA routing (Static Vue Files)
    location / {
        # Override the global root specifically for frontend traffic
        root /var/www/frontend;
        index index.html;
        
        # Try finding the exact file, then a directory, then fall back to index.html for Vue Router
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files (except .vite which is needed for dev)
    location ~ /\.(?!vite) {
        deny all;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}